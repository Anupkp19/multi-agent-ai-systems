    - paragraph [ref=e250]: Need a showstopper dessert that doesn't require baking the day away? This banoffee pie recipe is the answer.
    - generic [ref=e256]:
      - paragraph [ref=e257]:
        - text: If you’re looking for a dessert that’s tasty enough to make you Star Baker on the
        - emphasis [ref=e258]: The
        - emphasis [ref=e259]: Great British Bake Off
        - text: ", look no further. This fuss-free banoffee pie recipe is pretty enough for a celebration, but easy enough to serve as a weeknight dessert. I adore banoffee pie for its quick prep time and perfect marriage of flavors. And you’ll never have to worry about a soggy bottom with this foolproof pie!"
      - heading "What is banoffee pie?" [level=2] [ref=e260]
      - paragraph [ref=e261]:
        - text: Banoffee pie is a classic
        - link "British dessert" [ref=e262] [cursor=pointer]:
          - /url: https://www.tasteofhome.com/collection/traditional-british-desserts/
        - text: made of a sweet-salty graham cracker crust filled with dulce de leche and fresh banana slices, and finished with pillows of whipped cream and chocolate shavings. Purportedly invented in the 1970s by a restaurant in East Sussex, England, it was named “banoffee” for the flavor combination of bananas and toffee (and like most
        - link "British food names" [ref=e263] [cursor=pointer]:
          - /url: https://www.tasteofhome.com/collection/classic-british-food-names/
        - text: ", is best said aloud in your most impressive English accent). The flavor combo is so beloved that it’s inspired many other banoffee desserts, like banoffee cheesecake, trifles and cakes."
      - heading "Ingredients for Banoffee Pie" [level=2] [ref=e264]
      - list [ref=e265]:
        - listitem [ref=e266]:
          - strong [ref=e267]: "Graham cracker crust:"
          - text: While you can certainly buy a premade graham cracker crust, the magic happens when you use homemade ones—and they’re not hard to make. All you’ll need are graham cracker crumbs, melted butter, granulated sugar and a bit of salt.
        - listitem [ref=e268]:
          - strong [ref=e269]: "Bananas:"
          - text: Slice the bananas so they’re 1/4 inch thick. Any bigger will feel like overkill, but any smaller and you’ll hardly taste them.
        - listitem [ref=e270]:
          - strong [ref=e271]: "Dulce de leche:"
          - text: Find dulce de leche in the baking aisle or international aisle.
        - listitem [ref=e272]:
          - strong [ref=e273]: "Heavy whipping cream:"
          - text: We’re making our own whipped cream topping because most things taste better from scratch. Heavy whipping cream is the base of all whipped creams.
        - listitem [ref=e274]:
          - strong [ref=e275]: "Instant espresso powder:"
          - text: We add espresso powder to the whipped cream for a little bit of coffee flavor.
        - listitem [ref=e276]:
          - strong [ref=e277]: "Confectioners’ sugar:"
          - text: We sweeten the whipped cream just a bit with confectioners’ sugar.
        - listitem [ref=e278]:
          - strong [ref=e279]: "Vanilla extract:"
          - text: Feel free to use good-quality vanilla extract or vanilla paste. I love using vanilla paste in creamy desserts because the tiny black flecks are so pretty and flavorful.
        - listitem [ref=e280]:
          - strong [ref=e281]: "Chocolate bar:"
          - text: To finish the pie, shave chocolate curls off a dark or semisweet chocolate bar. I like to do this right on top of the finished pie.
      - heading "Directions" [level=2] [ref=e282]
      - 'heading "Step 1: Make the graham cracker crust" [level=3] [ref=e283]'
      - figure "TASTE OF HOME" [ref=e284]:
        - img "Banoffee Pie Tohvs25 279994 Mr 06 04 1" [ref=e285]
        - generic [ref=e286]: TASTE OF HOME
      - paragraph [ref=e288]: Preheat the oven to 350°F. In a large bowl, stir together the graham cracker crumbs, butter, sugar and salt.
      - paragraph [ref=e289]:
        - emphasis [ref=e290]: "Editor’s Tip:"
        - text: You can make graham cracker crumbs from whole graham crackers by pulsing the graham crackers in a food processor.
      - 'heading "Step 2: Form and bake the crust" [level=3] [ref=e291]'
      - figure "TASTE OF HOME" [ref=e292]:
        - img "Overhead shot of Press mixture into the bottom and up the sides sides of a 9 inch deep-dish pie plate; Bake until crust is set about 15 minutes; Cool completely; all set on a marble textured surface" [ref=e293]
        - generic [ref=e294]: TASTE OF HOME
      - paragraph [ref=e295]: Press the mixture into the bottom and up the sides of a 9-inch deep-dish pie plate. Bake the crust until it’s set, about 15 minutes. Cool the crust completely to room temperature.
      - 'heading "Step 3: Whip up the topping" [level=3] [ref=e296]'
      - figure "TASTE OF HOME" [ref=e297]:
        - img "Overheda shot of Place heavy whipping cream; espresso powder; confectioners’ sugar and vanilla extract in a large bowl; Whisk until soft peaks form; set aside; whisk tool; all set on a marble textured surface" [ref=e298]
        - generic [ref=e299]: TASTE OF HOME
      - paragraph [ref=e301]: Place the heavy whipping cream, espresso powder, confectioners’ sugar and vanilla extract in a large bowl. Whisk them together by hand or with beaters until soft peaks form. Set the whipped cream aside.
      - 'heading "Step 4: Add the filling" [level=3] [ref=e302]'
      - figure "TASTE OF HOME" [ref=e303]:
        - img "3/4 angle view shot of spread dulce de leche into cooled crust; on a marble textured surface" [ref=e304]
        - generic [ref=e305]: TASTE OF HOME
      - paragraph [ref=e306]: Using a mini offset spatula, rubber spatula or the back of a spoon, spread the dulce de leche into the cooled crust.
      - figure "TASTE OF HOME" [ref=e307]:
        - img "Overhead shot of Top with two layers of sliced bananas; on a marble textured surface" [ref=e308]
        - generic [ref=e309]: TASTE OF HOME
      - paragraph [ref=e311]: Top the dulce de leche with two layers of the sliced bananas.
      - paragraph [ref=e312]:
        - emphasis [ref=e313]: "Editor’s Tip:"
        - text: If the dulce de leche is too stiff, run your spatula or spoon under very hot water, then wipe it clean and spread out the dulce.
      - 'heading "Step 5: Spread on the whipped cream" [level=3] [ref=e314]'
      - figure "TASTE OF HOME" [ref=e315]:
        - img "3/4 angle view shot of spoon whipped cream over the bananas; Refrigerate at least three hours or overnight; all set on a marble textured surface" [ref=e316]
        - generic [ref=e317]: TASTE OF HOME
      - paragraph [ref=e318]: Spoon the whipped cream over the bananas.
      - paragraph [ref=e319]:
        - emphasis [ref=e320]: "Editor’s Tip:"
        - text: Feel free to add pretty swoops or other designs! I sometimes like to pipe the whipped cream on top in rows using a figure eight pattern.
      - 'heading "Step 6: Decorate the pie" [level=3] [ref=e321]'
      - figure "TASTE OF HOME" [ref=e322]:
        - img "Close shot of the same pie plate; garnish with chocolate shavings before serving; alls et on a marble textured surface" [ref=e323]
        - generic [ref=e324]: TASTE OF HOME
      - paragraph [ref=e326]: Refrigerate the banoffee pie for at least three hours or overnight. If desired, garnish the pie with chocolate shavings before serving.
      - figure "TASTE OF HOME" [ref=e327]:
        - img "3/4 angle view shot of Banoffee Pie in a large pie plate; sliced and served on two plates; with a fork resting on a light green napkin; all set on a marble-textured surface" [ref=e328]
        - generic [ref=e329]: TASTE OF HOME
      - heading "Recipe Variations" [level=2] [ref=e330]
      - list [ref=e331]:
        - listitem [ref=e332]:
          - strong [ref=e333]: "Try a different crumb crust:"
          - text: Bored of graham cracker crusts? There are so many other
          - link "crumb crust ingredients" [ref=e334] [cursor=pointer]:
            - /url: https://www.tasteofhome.com/collection/crumb-crust-ingredients/
          - text: to try out instead. Biscoff, Nilla wafers or even pretzels would all taste great in this banoffee pie recipe.
        - listitem [ref=e335]:
          - strong [ref=e336]: "Make the dulce de leche from scratch:"
          - text: It’s easier to make this pie with store-bought dulce de leche, but we’ll never turn down the desire to make as many ingredients from scratch as possible. Homemade
          - link "dulce de leche" [ref=e337] [cursor=pointer]:
            - /url: https://www.tasteofhome.com/recipes/dulce-de-leche-recipe/
          - text: is easy; just make sure you take the proper safety precautions.
      - heading "How to Store Banoffee Pie" [level=2] [ref=e338]
      - paragraph [ref=e339]: Banoffee pie absolutely must be stored in the fridge due to the dairy, but the bananas and whipped cream taste best when very cold.
      - heading "Can you make banoffee pie ahead of time?" [level=3] [ref=e341]
      - paragraph [ref=e342]: Yes! Banoffee pie can be made a day ahead. Cover it and store it in the fridge. You can also make the graham cracker crust several days in advance.
      - heading "Banoffee Pie Tips" [level=2] [ref=e343]
      - heading "What’s the best way to work with dulce de leche?" [level=3] [ref=e344]
      - paragraph [ref=e345]: If you have a very thick dulce de leche, it can be hard to get it into and out of a measuring cup or to spread it onto the graham cracker crust. I like to very lightly oil the entire inside of the measuring cup before adding the dulce de leche. This makes it easy to pour out. As for spreading it, run your spatula under hot water to make the dulce de leche much easier to spread. The same goes when you’re working with honey or any other sticky ingredient.
      - heading "How ripe should the bananas be for banoffee pie?" [level=3] [ref=e346]
      - paragraph [ref=e347]: You want the bananas to be fairly firm so they hold their shape when sliced, but ripe enough to taste sweet. Choose very yellow bananas with only a small smattering of brown spots.
      - heading "How do you prevent the bananas from browning?" [level=3] [ref=e348]
      - paragraph [ref=e349]: Bananas, like many other foods we love, can quickly oxidize and will turn an unappealing brown color when exposed to air. The best way to avoid oxidation is to cut the bananas just before filling the pie. Once they’re in the pie and sandwiched between the dulce de leche and whipped cream, they will no longer be exposed to air, and you won’t have to worry about them browning. If you must cut them ahead of time, squeeze fresh lemon juice on them to prevent oxidation.
      - heading "Watch How to Make Banoffee Pie" [level=2] [ref=e351]
