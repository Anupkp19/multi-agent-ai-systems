                - heading "❤️ About This Recipe" [level=2] [ref=e159]
                - paragraph [ref=e160]: Indo-Chinese veg fried rice is a fusion dish that combines elements of Indian and Chinese cuisines. It typically consists of cooked basmati rice stir-fried with a variety of vegetables, and aromatics like ginger and garlic, and flavored with soy sauce and other seasonings. This dish is known for its bold flavors, vibrant colors, and hearty textures.
                - paragraph [ref=e161]:
                  - text: It is often served as a standalone main course or as a side dish alongside other Indo-Chinese dishes such as
                  - link "veg manchurian" [ref=e162] [cursor=pointer]:
                    - /url: https://www.spiceupthecurry.com/veg-manchurian-dry-recipe/
                  - text: ","
                  - link "chilli paneer" [ref=e163] [cursor=pointer]:
                    - /url: https://www.spiceupthecurry.com/chilli-paneer-dry-recipe/
                  - text: ", or"
                  - link "vegetable hakka noodles" [ref=e164] [cursor=pointer]:
                    - /url: https://www.spiceupthecurry.com/hakka-noodles-recipe/
                  - text: .
                - generic [ref=e167]:
                  - paragraph [ref=e168]:
                    - strong [ref=e169]: You’ll Love This Veg Fried Rice Recipe
                  - list [ref=e170]:
                    - listitem [ref=e171]:
                      - strong [ref=e172]: Quick and Easy
                      - text: ": Ready in under 30 minutes, perfect for busy weeknights."
                    - listitem [ref=e173]:
                      - strong [ref=e174]: Ideal for Lunchboxes
                      - text: ": Pack it for school or work lunches, it’s delicious both hot and room temperature."
                    - listitem [ref=e175]:
                      - strong [ref=e176]: Customizable
                      - text: ": Use your favorite veggies or protein like tofu or paneer in this versatile dish."
                    - listitem [ref=e177]:
                      - strong [ref=e178]: Restaurant-Style Flavor
                      - text: ": Tastes just like your favorite Indo-Chinese restaurant or I would say better than restaurant."
                    - listitem [ref=e179]:
                      - strong [ref=e180]: Vegan
                      - text: ": This recipe is entirely plant-based, making it suitable for vegans and those looking for meat-free options."
                - heading "🧾 Ingredient Notes" [level=2] [ref=e182]
                - figure [ref=e184]:
                  - img "Veg fried rice recipe ingredients in bowls and spoons with labels." [ref=e185]
                - list [ref=e187]:
                  - listitem [ref=e188]:
                    - strong [ref=e189]: Basmati Rice
                    - text: ": Cook the rice until it’s fluffy and each grain is separate. Leftover rice works perfectly for this recipe."
                  - listitem [ref=e190]:
                    - strong [ref=e191]: Oil
                    - text: ": Always use oil that has a high smoke point as we are cooking on medium-high heat. e.g. peanut oil, safflower oil, avocado oil, etc."
                  - listitem [ref=e192]:
                    - strong [ref=e193]: "Ginger, Garlic:"
                    - text: I usually crush these into using
                    - link "a wet jar of my spice grinder" [ref=e194] [cursor=pointer]:
                      - /url: https://www.spiceupthecurry.com/recommends/spice-grinder/
                    - text: . Or you can mince them using a knife.
                  - listitem [ref=e195]:
                    - strong [ref=e196]: Veggies
                    - text: ": I have used onion, carrot, cabbage, green pepper, and green beans. Check out the variations section below for more ideas."
                    - list [ref=e197]:
                      - listitem [ref=e198]: I prefer to use fresh veggies as they give the best crisp texture.
                      - listitem [ref=e199]:
                        - emphasis [ref=e200]: You can use frozen veggies
                        - text: if short on time. But keep in mind that frozen veggies may turn out soft and stay crunchy like fresh ones.
                  - listitem [ref=e201]:
                    - strong [ref=e202]: Soy sauce
                    - text: ": Adds a savory umami flavor. I’ve used regular soy sauce, but you can opt for dark or light soy sauce according to your preference."
                  - listitem [ref=e203]:
                    - strong [ref=e204]: Vinegar
                    - text: ": I have used white vinegar here. Any other vinegar like rice vinegar, apple cider vinegar, chili vinegar, etc works too."
                  - listitem [ref=e205]:
                    - strong [ref=e206]: Spring Onion Greens
                    - text: ": Use the green part of spring onions as a garnish for a fresh touch."
                - heading "👩‍🍳 How To Make Veg Fried Rice? (Pics)" [level=2] [ref=e208]
                - paragraph [ref=e209]:
                  - strong [ref=e210]: "Prep:"
                - paragraph [ref=e211]:
                  - strong [ref=e212]: For the best results, cook the basmati rice a day before or a few hours ahead.
                  - text: You can follow any of the two methods
                  - text: –
                  - link "Cook basmati rice in instant pot" [ref=e213] [cursor=pointer]:
                    - /url: https://www.spiceupthecurry.com/instant-pot-basmati-rice/
                  - text: –
                  - link "Cook basmati rice on stovetop" [ref=e214] [cursor=pointer]:
                    - /url: https://www.spiceupthecurry.com/basmati-rice-recipe/
                - list [ref=e215]:
                  - listitem [ref=e216]:
                    - emphasis [ref=e217]: If you’re using leftover rice
                    - text: from the fridge, make sure to bring it to room temperature before using it.
                  - listitem [ref=e218]:
                    - emphasis [ref=e219]: If you’re cooking the rice fresh
                    - text: ", spread it out on a large plate or tray to cool down quickly. This step ensures that the rice maintains its texture and doesn’t clump together when added to the fried rice later on."
                - paragraph [ref=e220]:
                  - strong [ref=e221]: "Make Vegetable Fried Rice Recipe:"
                - paragraph [ref=e222]:
                  - text: 1, 2) Heat oil in a pan over
                  - strong [ref=e223]: medium-high heat
                  - text: . Once hot, add minced ginger and garlic, and sauté for about a minute until fragrant.
                - paragraph [ref=e224]: 3, 4) Add diced onion and cook for another minute until translucent.
                - paragraph [ref=e225]:
                  - text: 5, 6) Next, add the remaining vegetables (cabbage, green pepper, carrot, green beans). Add salt and cook for
                  - strong [ref=e226]: 4-5 minutes until they are tender-crisp
                  - text: (not mushy or completely tender soft).
                - figure [ref=e228]:
                  - img "Collage of 6 image showing sauteing ginger, garlic and stir frying veggies." [ref=e229]
                - paragraph [ref=e231]: 7, 8 , 9, 10) Season with black pepper, soy sauce, and vinegar. Stir to combine.
                - paragraph [ref=e232]: 11, 12) Add the cooked rice and spring onion greens to the pan. Toss everything together and cook for 2 minutes or until heated through.
                - figure [ref=e234]:
                  - img "Collage of 6 image showing adding sauce, vinegar, pepper and tossing rice and spring onions." [ref=e235]
                - heading "💭 Expert Tips" [level=2] [ref=e237]
                - list [ref=e238]:
                  - listitem [ref=e239]:
                    - strong [ref=e240]: "Leftover or Cooled Rice:"
                    - text: Use day-old rice or let freshly cooked rice cool completely to prevent it from becoming mushy when stir-fried.
                  - listitem [ref=e241]:
                    - strong [ref=e242]: "Same Size Veggies:"
                    - text: Make sure to dice all the veggies into even-sized pieces so they cook at the same time.
                  - listitem [ref=e243]:
                    - strong [ref=e244]: "Medium-High Heat:"
                    - text: Always stir fry veggies and toss rice on medium-high heat to ensure that the veggies and rice get nicely cooked without becoming mushy or overly dry.
                  - listitem [ref=e245]:
                    - strong [ref=e246]: "Smokey Flavor:"
                    - list [ref=e247]:
                      - listitem [ref=e248]:
                        - text: Ensure the
                        - strong [ref=e249]:
                          - emphasis [ref=e250]: wok or pan is hot
                        - text: before adding the ingredients to achieve that signature smoky flavor.
                      - listitem [ref=e251]:
                        - text: Using a
                        - strong [ref=e252]:
                          - emphasis [ref=e253]: cast iron pan
                        - text: (if the wok is not available) adds a delicious smoky flavor and helps achieve the perfect texture by evenly distributing heat throughout the rice and vegetables.
                  - listitem [ref=e254]:
                    - strong [ref=e255]: "Avoid Mushy Rice:"
                    - text: Always gently stir and toss it rather than vigorously mixing it.
                - heading "📖 Variations" [level=2] [ref=e256]
                - list [ref=e257]:
                  - listitem [ref=e258]:
                    - strong [ref=e259]: Veggies
                    - text: ": You can use a variety of vegetables like mushrooms, broccoli, cauliflower, snow peas, baby corn, sweet corn, green peas, zucchini, spinach, etc."
                  - listitem [ref=e260]:
                    - strong [ref=e261]: Protein
                    - text: ": You can add various vegetarian protein sources such as tofu or paneer cubes, edamame beans, tempeh, bean sprouts, etc."
                  - listitem [ref=e262]:
                    - strong [ref=e263]: Rice
                    - text: ": This recipe calls for basmati rice as this is an Indian fried rice recipe. But you can try Jasmine rice (fragrant and slightly sticky) or long-rain white rice such as Carolina, American long-grain rice."
                  - listitem [ref=e264]:
                    - strong [ref=e265]: Sauce
                    - text: ": For different flavor profiles, you can add chili sauce, schezwan sauce, green chili sauce, etc. Note these sauces will add some heat to your veg fried rice."
                  - listitem [ref=e266]:
                    - strong [ref=e267]: Extra flavor
                    - text: ": You can drizzle some toasted sesame oil at the end of cooking."
                - heading "🥣 Storage Instructions" [level=2] [ref=e269]
                - list [ref=e270]:
                  - listitem [ref=e271]:
                    - strong [ref=e272]: To Refrigerate,
                    - text: store leftover veg fried rice (if made from freshly cooked rice) in an airtight container for up to 2 days.
                    - list [ref=e273]:
                      - listitem [ref=e274]:
                        - strong [ref=e275]:
                          - emphasis [ref=e276]: "Note: It’s not recommended to store fried rice made from leftover rice again in the fridge. Consume it fresh."
                  - listitem [ref=e277]:
